<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SA Kumar Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2315637e'/%3E%3Cpath d='M28 52l14 14 30-32' stroke='white' stroke-width='10' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
</head>
<body>
  <!-- ===================== LOGIN ===================== -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark">✓</div>
        <h1>SA Kumar Task Manager</h1>
        <p>Financial-year task tracking for your accounting processes</p>
      </div>
      <form id="login-form" class="login-form">
        <label>Username
          <input type="text" id="login-username" autocomplete="username" required />
        </label>
        <label>Password
          <input type="password" id="login-password" autocomplete="current-password" required />
        </label>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">✓</div>
        <span>SA Kumar Task Manager</span>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="avatar" id="user-avatar"></div>
          <div class="user-meta">
            <span id="user-name"></span>
            <small id="user-role"></small>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-ghost btn-sm" title="Sign out">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <div class="view" id="view"></div>
    </main>
  </div>

  <!-- Toast + modal host -->
  <div id="toast-host" class="toast-host"></div>
  <div id="modal-host"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
